#====================================================#
#                picom.conf FIXED                   #
#====================================================#

#################################
#             Shadows           #
#################################

shadow = false;

shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;

#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

#################################
#   Transparency / Opacity      #
#################################

# IMPORTANT FIX
frame-opacity = 1.0;

#################################
#           Corners             #
#################################

corner-radius = 0;

#################################
#            Blur               #
#################################

blur-kern = "3x3box";

#################################
#       General Settings        #
#################################

backend = "glx";
vsync = true;

detect-rounded-corners = false;
detect-client-opacity = true;

detect-transient = true;

use-damage = true;

#################################
#           Rules               #
#################################

rules: ({
  match = "window_type = 'tooltip'";
  fade = false;
  shadow = false;
  opacity = 0.75;
}, {
  match = "window_type = 'dock' || window_type = 'desktop' || _GTK_FRAME_EXTENTS@";
  shadow = false;
  blur-background = false;
}, {
  match = "window_type = 'dock' || window_type = 'desktop'";
  corner-radius = 0;
}, {
  match = "name = 'Notification'   || "
          "class_g = 'Conky'       || "
          "class_g ?= 'Notify-osd' || "
          "class_g = 'Cairo-clock' || "
          "_GTK_FRAME_EXTENTS@";
  shadow = false;
})
